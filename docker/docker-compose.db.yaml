services:
  db:
    image: postgres:18-alpine
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    container_name: englishdb
    user: ${POSTGRES_USER}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: 12345
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-network
    volumes:
      - postgresql-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - ${ADMINER_PORT:-8080}:8080
    networks:
      - api-network

  pgadmin:
    image: dpage/pgadmin4:9.8.0
    restart: always
    ports:
      - ${PGADM_PORT:-80}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADM_MAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADM_PASS}
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  postgresql-data:
