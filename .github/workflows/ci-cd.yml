name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma
        run: pnpm exec nx run-many -t prisma:generate

      - name: Run Lint
        run: pnpm exec nx run-many -t lint

      - name: Run Tests
        run: pnpm exec nx run-many -t test

      - name: Build app
        run: pnpm exec nx run-many -t build

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/english-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/english-app
