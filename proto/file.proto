syntax = "proto3";

import "google/protobuf/wrappers.proto";

package file;

service FileService {
	rpc GetPresignedUrl(GetPresignedUrlDto) returns(PresignedUrlResponse) {}
	rpc GetUrls(GetUrlsDto) returns(UrlsDto) {}
}

message GetPresignedUrlDto {
	google.protobuf.StringValue file_name      = 1;
	google.protobuf.Int32Value  file_size      = 2;
	google.protobuf.StringValue content_type   = 3;
	google.protobuf.BoolValue   is_public_file = 4;
}

message PresignedUrlResponse {
	string              id         = 1;
	string              upload_url = 2;
	string              file_name  = 3;
	map<string, string> form_data  = 4;
}

message GetUrlsDto {
	repeated google.protobuf.StringValue ids = 1;
}

message UrlsDto {
	map<string, string> urls = 1;
}
