syntax = "proto3";

package file;

service FileService {
	rpc GetPresignedUrl(GetPresignedUrlDto) returns(PresignedUrlResponse) {}
	rpc GetUrls(GetUrlsDto) returns(UrlsDto) {}
}

message GetPresignedUrlDto {
	string file_name      = 1;
	int32  file_size      = 2;
	string content_type   = 3;
	bool   is_public_file = 4;
}

message PresignedUrlResponse {
	string              id         = 1;
	string              upload_url = 2;
	string              file_name  = 3;
	map<string, string> form_data  = 4;
}

message GetUrlsDto {
	repeated string ids = 1;
}

message UrlsDto {
	map<string, string> urls = 1;
}
