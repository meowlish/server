syntax = "proto3";

import "common.proto";

package file;

service FileService {
	rpc GetPresignedUrl(GetPresignedUrlDto) returns(PresignedUrlResponse) {}
}

message GetPresignedUrlDto {
	string file_name    = 1;
	int32  file_size    = 2;
	string content_type = 3;
}

message PresignedUrlResponse {
	string id         = 1;
	string upload_url = 2;
	string file_name  = 3;

}
