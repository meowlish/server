syntax = "proto3";

import "common.proto";

package blog;

service BlogService {
  rpc CreateBlog(CreateBlogRequest) returns (BlogResponse) {}
  rpc GetBlog(GetBlogRequest) returns (BlogResponse) {}
  rpc UpdateBlog(UpdateBlogRequest) returns (BlogResponse) {}
  rpc DeleteBlog(DeleteBlogRequest) returns (common.Empty) {}
  rpc ListBlogs(ListBlogsRequest) returns (ListBlogsResponse) {}
}

message BlogResponse {
  string id = 1;
  string title = 2;
  string content = 3;
  string author_id = 4;
  repeated string tags = 5;
  string created_at = 6;
  string updated_at = 7;
}

message CreateBlogRequest {
  string title = 1;
  string content = 2;
  string author_id = 3;
  repeated string tags = 4;
}

message GetBlogRequest {
  string id = 1;
}

message UpdateBlogRequest {
  string id = 1;
  optional string title = 2;
  optional string content = 3;
  repeated string tags = 4;
}

message DeleteBlogRequest {
  string id = 1;
}

message ListBlogsRequest {
  optional string author_id = 1;
  repeated string tags = 2;
  optional int32 page = 3;
  optional int32 limit = 4;
}

message ListBlogsResponse {
  repeated BlogResponse blogs = 1;
  int32 total_count = 2;
}
