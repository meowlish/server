syntax = "proto3";

import "common.proto";

package exam;

service ExamManagementService {
	rpc CreateExam(CreateExamDto) returns (CreatedExamDto) {}
	rpc CreateSection(CreateSectionDto) returns (CreatedSectionDto) {}
	rpc CreateQuestion(CreateQuestionDto) returns (CreatedQuestionDto) {}
	rpc UpdateExam(UpdateExamDto) returns (common.Empty) {}
	rpc UpdateSection(UpdateSectionDto) returns (common.Empty) {}
	rpc UpdateQuestion(UpdateQuestionDto) returns (common.Empty) {}
	rpc DeleteExam(DeleteExamDto) returns (common.Empty) {}
	rpc DeleteSection(DeleteSectionDto) returns (common.Empty) {}
	rpc DeleteQuestion(DeleteQuestionDto) returns (common.Empty) {}
	rpc MoveSection(MoveSectionDto) returns (common.Empty) {}
	rpc MoveQuestion(MoveQuestionDto) returns (common.Empty) {}
	rpc ReviewExam(ReviewExamDto) returns (common.Empty) {}
}

service ExamPracticeService {
	rpc Attempt(AttemptDto) returns (CreatedAttemptDto) {}
	rpc EndAttempt(EndAttemptDto) returns (common.Empty) {}
	rpc Answer(AnswerDto) returns (common.Empty) {}
	rpc RemoveAnswer(RemoveAnswerDto) returns (common.Empty) {}
	rpc AddNote(AddNoteDto) returns (common.Empty) {}
	rpc ToggleFlag(ToggleFlagDto) returns (FlagStateDto) {}
}

service TagService {
	rpc AddTag(AddTagDto) returns (common.Empty) {}
	rpc DeleteTag(DeleteTagDto) returns (common.Empty) {}
	rpc UpdateTag(UpdateTagDto) returns (common.Empty) {}
	rpc MoveTag(MoveTagDto) returns (common.Empty) {}
}

// Request
message CreateExamDto {
	string created_by  = 1;
	string title       = 2;
	string description = 3;
	int32  duration    = 4;
}

message CreatedExamDto {
	string id = 1;
}

message CreateSectionDto {
	optional string section_id = 1;
	optional string exam_id    = 2;
	optional int32  index      = 3;
}

message CreatedSectionDto {
	string id = 1;
}

message CreateQuestionDto {
	string         section_id = 1;
	optional int32 index      = 2;
}

message CreatedQuestionDto {
	string id = 1;
}

message UpdateExamDto {
	string          id                   = 1;
	optional string title                = 2;
	optional bool   set_description_null = 3;
	optional string description          = 4;
	optional int32  duration             = 5;
	repeated string add_tags             = 6;
	repeated string remove_tags          = 7;
}

message UpdateSectionDto {
	string          id            = 1;
	optional bool   set_name_null = 2;
	optional string name          = 3;
	optional string directive     = 4;
	optional string content_type  = 5;
	repeated string add_tags      = 6;
	repeated string remove_tags   = 7;
	repeated string add_files     = 8;
	repeated string remove_files  = 9;
}

message UpdateQuestionDto {
	string id = 1;

	optional string content     = 2;
	optional string explanation = 3;
	optional int32  points      = 4;
	optional string type        = 5;

	repeated AddChoice    add_choices        = 6;
	repeated string       delete_choices_ids = 7;
	repeated UpdateChoice update_choices     = 8;

	repeated string add_tags     = 9;
	repeated string remove_tags  = 10;
	repeated string add_files    = 11;
	repeated string remove_files = 12;

	message AddChoice {
		string          key        = 1;
		optional string content    = 2;
		bool            is_correct = 3;
	}

	message UpdateChoice {
		string          id               = 1;
		optional string key              = 2;
		optional string content          = 3;
		optional bool   is_correct       = 4;
		optional bool   set_content_null = 5;
	}
}

message DeleteExamDto {
	string id = 1;
}

message DeleteSectionDto {
	string id = 1;
}

message DeleteQuestionDto {
	string id = 1;
}

message MoveSectionDto {
	string          id        = 1;
	optional int32  index     = 2;
	optional string parent_id = 3;
	optional bool   to_root   = 4;
}

message MoveQuestionDto {
	string          id         = 1;
	optional int32  index      = 2;
	optional string section_id = 3;
}

message ReviewExamDto {
	string id     = 1;
	string status = 2;
}

message AttemptDto {
	string           user_id = 1;
	string           exam_id = 2;
	optional Options options = 3;

	message Options {
		optional int32  duration    = 1;
		repeated string section_ids = 2;
	}
}

message CreatedAttemptDto {
	string id = 1;
}

message EndAttemptDto {
	string attempt_id = 1;
}

message AnswerDto {
	string attempt_id  = 1;
	string question_id = 2;
	string answer      = 3;
}

message RemoveAnswerDto {
	string          attempt_id  = 1;
	string          question_id = 2;
	optional string answer      = 3;
}

message AddNoteDto {
	string attempt_id  = 1;
	string question_id = 2;
	string note        = 3;
}

message ToggleFlagDto {
	string attempt_id  = 1;
	string question_id = 2;
}

message FlagStateDto {
	bool state = 1;
}

message AddTagDto {
	string          name      = 1;
	optional string parent_id = 2;
}

message DeleteTagDto {
	string id = 1;
}

message UpdateTagDto {
	string id   = 1;
	string name = 2;
}

message MoveTagDto {
	string          id        = 1;
	optional string parent_id = 2;
}
