syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

package auth;

service AuthService {
    // mail
	rpc RegisterMail(RegisterMailDto) returns (Tokens) {}
	rpc LoginMail(LoginMailDto) returns (Tokens) {}
	rpc AddMailCredential(AddMailCredDto) returns (google.protobuf.Empty) {}
	rpc UpdateMailPassword(UpdateMailPasswordDto) returns (google.protobuf.Empty) {}
    // google
	rpc RegisterOrLoginGoogle(RegisterOrLoginGoogleDto) returns (Tokens) {}
	rpc AddGoogleCredential(AddGoogleCredDto) returns (google.protobuf.Empty) {}
    // creds
	rpc GetCredentials(GetCredsDto) returns (Credentials) {}
	rpc RemoveCredential(RemoveCredDto) returns (google.protobuf.Empty) {}
    // common
	rpc Refresh(RefreshDto) returns (Tokens) {}
	rpc ValidateRefresh(ValidateRefreshDto) returns (Claims) {}
	rpc ValidateAccess(ValidateAccessDto) returns (google.protobuf.Empty) {}
	rpc LogOutAll(LogOutAllDto) returns (google.protobuf.Empty) {}
    // roles
	rpc GetRoleList(google.protobuf.Empty) returns (RoleList) {}
	rpc GetPermList(google.protobuf.Empty) returns (PermList) {}
	rpc AssignRoleTo(AssignRoleToDto) returns (google.protobuf.Empty) {}
	rpc RemoveRoleFrom(RemoveRoleFromDto) returns (google.protobuf.Empty) {}
    // identity
	rpc UpdateIdentity(UpdateIdentityDto) returns (google.protobuf.Empty) {}
    // qol
	rpc FindIdentityIds(FindIdentityIdsDto) returns (IdentityIds){}
	rpc FindIdentities(FindIdentitiesDto) returns (Identities) {}
}

// Request
message RegisterMailDto {
	google.protobuf.StringValue username = 1;
	google.protobuf.StringValue mail     = 2;
	google.protobuf.StringValue password = 3;
}

message LoginMailDto {
	google.protobuf.StringValue mail     = 1;
	google.protobuf.StringValue password = 2;
}

message AddMailCredDto {
	google.protobuf.StringValue identity_id = 1;
	google.protobuf.StringValue mail        = 2;
	google.protobuf.StringValue password    = 3;
}

message UpdateMailPasswordDto {
	google.protobuf.StringValue identity_id = 1;
	google.protobuf.StringValue id          = 2;
	google.protobuf.StringValue password    = 3;
}

message RegisterOrLoginGoogleDto {
	google.protobuf.StringValue identifier = 1;
	google.protobuf.StringValue username   = 2;
}

message AddGoogleCredDto {
	google.protobuf.StringValue identity_id = 1;
	google.protobuf.StringValue identifier  = 2;
}

message GetCredsDto {
	google.protobuf.StringValue identity_id = 1;
}

message RemoveCredDto {
	google.protobuf.StringValue identity_id = 1;
	google.protobuf.StringValue id          = 2;
}

message RefreshDto {
	google.protobuf.StringValue identity_id = 1;
}

message ValidateRefreshDto {
	google.protobuf.StringValue identity_id = 1;
	google.protobuf.Int32Value  iat         = 2;
}

message ValidateAccessDto {
	google.protobuf.StringValue identity_id = 1;
	google.protobuf.Int32Value  iat         = 2;
}

message LogOutAllDto {
	google.protobuf.StringValue identity_id = 1;
}

message UpdateIdentityDto {
	google.protobuf.StringValue          identity_id        = 1;
	optional google.protobuf.StringValue username           = 2;
	optional google.protobuf.StringValue full_name          = 3;
	optional google.protobuf.BoolValue   set_full_name_null = 4;
	optional google.protobuf.StringValue bio                = 5;
	optional google.protobuf.BoolValue   set_bio_null       = 6;
	optional google.protobuf.StringValue avatar_id          = 7;
	optional google.protobuf.BoolValue   set_avatar_id_null = 8;
}

message AssignRoleToDto {
	google.protobuf.StringValue role_id     = 1;
	google.protobuf.StringValue identity_id = 2;
}

message RemoveRoleFromDto {
	google.protobuf.StringValue role_id     = 1;
	google.protobuf.StringValue identity_id = 2;
}

message FindIdentityIdsDto {
	optional google.protobuf.StringValue username_or_cred_identifier = 1;
	optional google.protobuf.StringValue cursor                      = 2;
	optional google.protobuf.Int32Value  limit                       = 3;
}

message FindIdentitiesDto {
	optional google.protobuf.StringValue username_or_cred_identifier = 1;
	repeated google.protobuf.StringValue has_roles                   = 2;
	repeated google.protobuf.StringValue has_perms                   = 3;
	optional google.protobuf.StringValue cursor                      = 4;
	optional google.protobuf.Int32Value  limit                       = 5;
}

// Response
message Tokens {
	string          access_token  = 1;
	optional string refresh_token = 2;
}

message Identity {
	string          id       = 1;
	string          username = 2;
	repeated string roles    = 3;
}

message Role {
	string          id          = 1;
	string          name        = 2;
	repeated string permissions = 3;
}

message Claims {
	string          sub         = 1;
	repeated string roles       = 2;
	repeated string permissions = 3;
}

message RoleList {
	repeated Role roles = 1;
}

message PermList {
	repeated string perms = 1;
}

message IdentityIds {
	repeated string ids    = 1;
	string          cursor = 2;
}

message Identities {
	repeated Identity identities = 1;
	string            cursor     = 2;

	message Identity {
		string          id          = 1;
		string          username    = 2;
		optional string full_name   = 3;
		optional string bio         = 4;
		optional string avatar_url  = 5;
		repeated string roles       = 6;
		repeated string permissions = 7;
	}
}

message Credentials {
	repeated Credential credentials = 1;

	message Credential {
		string id   = 1;
		string type = 2;
	}
}
