syntax = "proto3";

import "common.proto";

package auth;

service AuthService {
	rpc RegisterMail(RegisterMailDto) returns (Tokens) {}
	rpc LoginMail(LoginMailDto) returns (Tokens) {}
	rpc Refresh(RefreshDto) returns (Tokens) {}
	rpc ValidateRefresh(ValidateRefreshDto) returns (Claims) {}
	rpc ValidateAccess(ValidateAccessDto) returns (common.Empty) {}
	rpc LogOutAll(LogOutAllDto) returns (common.Empty) {}
}

// Request
message RegisterMailDto {
	string username = 1;
	string mail     = 2;
	string password = 3;
}

message LoginMailDto {
	string mail     = 1;
	string password = 2;
}

message RefreshDto {
	string identity_id = 1;
}

message ValidateRefreshDto {
	string identity_id = 1;
	int32  iat         = 2;
}

message ValidateAccessDto {
	string identity_id = 1;
	int32  iat         = 2;
}

message LogOutAllDto {
	string identity_id = 1;
}

// Response
message Tokens {
	string          access_token  = 1;
	optional string refresh_token = 2;
}

message Identity {
	string          id       = 1;
	string          username = 2;
	repeated string roles    = 3;
}

message Role {
	string          id          = 1;
	string          name        = 2;
	repeated string permissions = 3;
}

message Claims {
	string          sub         = 1;
	repeated string roles       = 2;
	repeated string permissions = 3;
}
